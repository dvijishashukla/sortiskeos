# logstash.conf
# -------------
# Logstash pipeline configuration.
# Place this file at: elk/logstash/pipeline/logstash.conf
#
# Flow:
#   INPUT  → watches the staging JSON file written by log_collector.py
#   FILTER → parses and enriches each log entry
#   OUTPUT → sends to Elasticsearch under index "system-logs-YYYY.MM.dd"

input {
  # Watch the staging file that log_collector.py writes to
  file {
    path           => "/usr/share/logstash/collected_logs/system_logs.json"
    start_position => "beginning"
    sincedb_path   => "/usr/share/logstash/sincedb/.sincedb_system_logs"
    codec          => "json"       # each line is a JSON object
    mode           => "read"       # read once (not tail) — good for post-crash batch
  }

  # ALSO accept logs pushed directly via HTTP (for testing / direct ES push)
  http {
    port  => 8080
    codec => "json"
  }
}

filter {
  # ── Normalize the timestamp field ─────────────────────────────────────────
  date {
    match       => ["@timestamp", "ISO8601"]
    target      => "@timestamp"
    timezone    => "UTC"
  }

  # ── Normalize log level to uppercase ──────────────────────────────────────
  mutate {
    uppercase => ["level"]
  }

  # ── Map level to a numeric severity score (useful for Kibana charts) ──────
  if [level] == "CRITICAL" { mutate { add_field => { "severity" => 5 } } }
  else if [level] == "ERROR"    { mutate { add_field => { "severity" => 4 } } }
  else if [level] == "WARN"     { mutate { add_field => { "severity" => 3 } } }
  else if [level] == "WARNING"  { mutate { add_field => { "severity" => 3 } } }
  else if [level] == "INFO"     { mutate { add_field => { "severity" => 2 } } }
  else                          { mutate { add_field => { "severity" => 1 } } }

  # ── Tag shutdown-related keywords for easy Kibana filtering ───────────────
  if [message] =~ /(?i)(shutdown|crash|panic|timeout|connection refused|failed|error|killed)/ {
    mutate { add_tag => ["suspicious"] }
  }

  if [message] =~ /(?i)(kernel panic|out of memory|oom|segfault|stack trace)/ {
    mutate { add_tag => ["critical_event"] }
  }

  # ── Remove internal Logstash fields we don't need ─────────────────────────
  mutate {
    remove_field => ["@version", "event", "log", "input"]
  }
}

output {
  # ── Send to Elasticsearch ─────────────────────────────────────────────────
  elasticsearch {
    hosts    => ["http://elasticsearch:9200"]
    index    => "system-logs-%{+YYYY.MM.dd}"    # daily index rotation
    # document_id => "%{es_id}"                 # uncomment to prevent duplicates
  }

  # ── Also print to Logstash console (helpful for debugging) ────────────────
  stdout {
    codec => rubydebug
  }
}
