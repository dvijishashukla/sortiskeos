input {
  file {
    path => "/logs/HDFS_small.log"
    start_position => "beginning"
    sincedb_path => "/usr/share/logstash/data/sincedb"
    codec => "plain"
    ignore_older => 604800
    close_older => 3600
    discover_interval => 15
  }
}

filter {
  grok {
    match => {
      "message" => [
        "%{TIMESTAMP_ISO8601:log_timestamp} %{LOGLEVEL:log_level} %{DATA:component} - %{GREEDYDATA:log_message}",
        "%{GREEDYDATA:log_message}"
      ]
    }
    tag_on_failure => []
  }

  if [log_timestamp] {
    date {
      match => ["log_timestamp", "yyyy-MM-dd HH:mm:ss", "ISO8601"]
      target => "@timestamp"
      remove_field => ["log_timestamp"]
    }
  }

  # Single compact grok to extract common details (exceptions, HTTP status, response time)
  grok {
    match => { "log_message" => ["(?<exception_type>[A-Za-z]+Exception|[A-Za-z]+Error)|HTTP\s+%{NUMBER:http_status_code:int}|(?:in|took|elapsed)\s+%{NUMBER:response_time_ms:float}\s*ms"] }
    tag_on_failure => []
  }

  mutate {
    uppercase => ["log_level"]
    add_field => { "pipeline_version" => "1.0" }
  }

  if [log_level] in ["ERROR", "CRITICAL"] or [exception_type] {
    mutate { add_tag => ["high_severity"] }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "hdfs-logs"
    ilm_enabled => false
    # reduce retry/backoff pressure on a laptop
    manage_template => false
  }

  # keep stdout disabled by default to lower CPU; uncomment for debugging
  # stdout { codec => rubydebug }
}